<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1825"/>
      <stop offset="50%" stop-color="#050A14"/>
      <stop offset="100%" stop-color="#0A1424"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4FD9"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A4FD9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A4FD9" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#0A4FD9" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
    <line x1="1100" y1="0" x2="1100" y2="600"/>
  </g>

  <!-- Glow orbs in background -->
  <circle cx="200" cy="300" r="180" fill="url(#glowGrad)" filter="url(#blur)"/>
  <circle cx="1000" cy="200" r="150" fill="url(#glowGrad)" filter="url(#blur)" opacity="0.7"/>

  <!-- LEFT: Social media source icons -->
  <g transform="translate(80, 180)">
    <!-- Facebook icon card -->
    <g>
      <rect x="0" y="0" width="100" height="100" rx="20" fill="#1B2838" stroke="#0A4FD9" stroke-opacity="0.3" stroke-width="1"/>
      <text x="50" y="68" font-family="Inter, Arial" font-size="56" font-weight="700" fill="#00E5FF" text-anchor="middle">f</text>
    </g>
    <!-- Instagram icon card -->
    <g transform="translate(0, 130)">
      <rect x="0" y="0" width="100" height="100" rx="20" fill="#1B2838" stroke="#0A4FD9" stroke-opacity="0.3" stroke-width="1"/>
      <rect x="28" y="28" width="44" height="44" rx="12" fill="none" stroke="#00E5FF" stroke-width="3"/>
      <circle cx="50" cy="50" r="13" fill="none" stroke="#00E5FF" stroke-width="3"/>
      <circle cx="68" cy="32" r="3" fill="#00E5FF"/>
    </g>
    <!-- Facebook mini card -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="100" height="100" rx="20" fill="#1B2838" stroke="#0A4FD9" stroke-opacity="0.3" stroke-width="1"/>
      <text x="50" y="68" font-family="Inter, Arial" font-size="56" font-weight="700" fill="#00E5FF" text-anchor="middle">f</text>
    </g>
  </g>

  <!-- MIDDLE: Connection flow / extraction lines -->
  <g transform="translate(220, 0)" stroke="url(#accentGrad)" stroke-width="2" fill="none">
    <!-- Flow lines from social icons to data -->
    <path d="M 0 230 Q 100 230 200 230" stroke-dasharray="6 4" opacity="0.7"/>
    <path d="M 0 360 Q 100 320 200 290" stroke-dasharray="6 4" opacity="0.5"/>
    <path d="M 0 490 Q 100 400 200 350" stroke-dasharray="6 4" opacity="0.4"/>

    <!-- Small data nodes along flow -->
    <circle cx="50" cy="230" r="3" fill="#00E5FF" stroke="none"/>
    <circle cx="100" cy="240" r="3" fill="#00E5FF" stroke="none"/>
    <circle cx="150" cy="245" r="3" fill="#00E5FF" stroke="none"/>
    <circle cx="60" cy="320" r="3" fill="#0A4FD9" stroke="none"/>
    <circle cx="120" cy="305" r="3" fill="#0A4FD9" stroke="none"/>
    <circle cx="170" cy="295" r="3" fill="#0A4FD9" stroke="none"/>
  </g>

  <!-- CENTER: Extraction hub / funnel symbol -->
  <g transform="translate(440, 130)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="url(#dataGrad)" stroke="url(#accentGrad)" stroke-width="2"/>

    <!-- Center S logo (subtle) -->
    <text x="0" y="12" font-family="Inter, Arial" font-size="36" font-weight="800" fill="url(#accentGrad)" text-anchor="middle">S</text>

    <!-- Rotating dots around the circle -->
    <circle cx="80" cy="0" r="4" fill="#00E5FF"/>
    <circle cx="-80" cy="0" r="4" fill="#0A4FD9"/>
    <circle cx="0" cy="-80" r="4" fill="#00E5FF"/>
    <circle cx="0" cy="80" r="4" fill="#0A4FD9"/>

    <!-- Data points being extracted -->
    <g font-family="Inter, Arial" font-size="9" fill="#94A3B8" font-weight="600">
      <text x="-100" y="-50">+880</text>
      <text x="-105" y="-30">name</text>
      <text x="-90" y="60">email</text>
      <text x="60" y="-50">category</text>
      <text x="55" y="65">website</text>
    </g>
  </g>

  <!-- RIGHT: Output data table -->
  <g transform="translate(640, 110)">
    <!-- Table background -->
    <rect x="0" y="0" width="460" height="380" rx="12" fill="#0E1825" stroke="#0A4FD9" stroke-opacity="0.4" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="460" height="40" rx="12" fill="url(#accentGrad)" opacity="0.2"/>
    <text x="20" y="25" font-family="Inter, Arial" font-size="13" font-weight="700" fill="#F8FAFC">LEAD DATA</text>
    <circle cx="430" cy="20" r="4" fill="#10B981"/>
    <text x="395" y="25" font-family="Inter, Arial" font-size="11" font-weight="600" fill="#10B981">LIVE</text>

    <!-- Table rows -->
    <g font-family="Inter, Arial" font-size="12">
      <!-- Row 1: Business name -->
      <text x="20" y="80" font-weight="600" fill="#94A3B8">Business</text>
      <text x="180" y="80" font-weight="700" fill="#F8FAFC">Mode By Sara</text>
      <line x1="20" y1="95" x2="440" y2="95" stroke="#1B2838" stroke-width="1"/>

      <!-- Row 2: Category -->
      <text x="20" y="120" font-weight="600" fill="#94A3B8">Category</text>
      <text x="180" y="120" fill="#00E5FF">Clothing</text>
      <line x1="20" y1="135" x2="440" y2="135" stroke="#1B2838" stroke-width="1"/>

      <!-- Row 3: Phone -->
      <text x="20" y="160" font-weight="600" fill="#94A3B8">Phone</text>
      <text x="180" y="160" fill="#F8FAFC">+8801692808604</text>
      <line x1="20" y1="175" x2="440" y2="175" stroke="#1B2838" stroke-width="1"/>

      <!-- Row 4: Email -->
      <text x="20" y="200" font-weight="600" fill="#94A3B8">Email</text>
      <text x="180" y="200" fill="#F8FAFC">contact@modebysara.com</text>
      <line x1="20" y1="215" x2="440" y2="215" stroke="#1B2838" stroke-width="1"/>

      <!-- Row 5: Website -->
      <text x="20" y="240" font-weight="600" fill="#94A3B8">Website</text>
      <text x="180" y="240" fill="#00E5FF">modebysara.com</text>
      <line x1="20" y1="255" x2="440" y2="255" stroke="#1B2838" stroke-width="1"/>

      <!-- Row 6: Followers -->
      <text x="20" y="280" font-weight="600" fill="#94A3B8">Followers</text>
      <text x="180" y="280" fill="#F8FAFC">24,569</text>
      <line x1="20" y1="295" x2="440" y2="295" stroke="#1B2838" stroke-width="1"/>

      <!-- Row 7: Score -->
      <text x="20" y="320" font-weight="600" fill="#94A3B8">Score</text>
      <text x="180" y="320" fill="#10B981" font-weight="700">9 / 10</text>
    </g>

    <!-- Score badge -->
    <circle cx="425" cy="320" r="14" fill="#10B981" opacity="0.2"/>
    <text x="425" y="325" font-family="Inter, Arial" font-size="12" font-weight="800" fill="#10B981" text-anchor="middle">9</text>
  </g>

  <!-- Foreground subtle particles -->
  <g fill="#00E5FF" opacity="0.3">
    <circle cx="350" cy="80" r="1.5"/>
    <circle cx="500" cy="500" r="1.5"/>
    <circle cx="850" cy="60" r="1"/>
    <circle cx="1100" cy="450" r="1.5"/>
    <circle cx="650" cy="510" r="1"/>
    <circle cx="300" cy="450" r="1"/>
  </g>

  <!-- Top right corner accent -->
  <g transform="translate(1140, 30)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#00E5FF"/>
    <circle cx="12" cy="0" r="2" fill="#0A4FD9"/>
    <circle cx="22" cy="0" r="1.5" fill="#00E5FF"/>
  </g>
</svg>