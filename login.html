<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scraven — Sign In</title>
  <link rel="canonical" href="https://lead-gen-phcw.onrender.com/login" />
  <meta property="og:title" content="Scraven — Sign In" />
  <meta property="og:description" content="Sign in to your Scraven account to extract and manage leads from Facebook and Instagram pages." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lead-gen-phcw.onrender.com/login" />
  <meta property="og:image" content="https://lead-gen-phcw.onrender.com/assets/og-default.png" />
  <meta name="description" content="Sign in to your Scraven account to extract and manage leads from Facebook and Instagram pages." />
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon32.png" />
  <link rel="apple-touch-icon" href="assets/icon192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :focus-visible { outline: 3px solid rgba(0, 229, 255, 0.25); outline-offset: 2px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050A14; color: #E2E8F0; font-size: 16px; line-height: 1.6;
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    .nav{width:100%;display:flex;align-items:center;gap:12px;padding:12px 24px;background:rgba(5,10,20,0.8);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid rgba(226,232,240,0.06);position:sticky;top:0;z-index:100}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#F8FAFC;font-size:18px;font-weight:700;transition:transform .2s}
    .logo:hover{transform:scale(1.03)}
    .logo-icon{width:36px;height:36px;border-radius:10px;object-fit:contain;flex-shrink:0;display:block}
    .brand-navy{color:#0A4FD9}
    .brand-white{color:#F8FAFC}
    .nav-links{display:flex;align-items:center;gap:12px}
    .nav-links a,.nav-links button{color:#94A3B8;text-decoration:none;font-size:14px;padding:8px 14px;border-radius:8px;transition:all .2s;background:none;border:none;cursor:pointer;font-family:inherit}
    .nav-links a:hover,.nav-links button:hover{color:#F8FAFC;background:rgba(148,163,184,0.08)}
    .nav-links a.active{color:#00E5FF;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);box-shadow:0 0 16px rgba(0,229,255,0.18);position:relative}
    .nav-links a.active::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:24px;height:2px;background:linear-gradient(90deg,#0A4FD9,#00E5FF);border-radius:2px;box-shadow:0 0 8px rgba(0,229,255,0.6)}
    #auth-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
    .auth-btn{background:linear-gradient(135deg,#0A4FD9,#00E5FF);color:#fff!important;font-weight:600;padding:7px 14px!important;border-radius:8px!important;min-height:32px;display:inline-flex;align-items:center;justify-content:center;line-height:1;box-sizing:border-box;transition:opacity .2s,transform .15s;font-size:13px;white-space:nowrap}
    .auth-btn:hover{background:linear-gradient(135deg,#0A4FD9,#00E5FF)!important;opacity:0.92}
    .avatar-circle img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.avatar-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0A4FD9,#00E5FF);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;cursor:pointer;text-decoration:none!important;padding:0!important}
    @media(max-width:600px){.nav{flex-wrap:wrap;gap:8px;padding:8px 12px}.nav-links{flex-wrap:wrap;gap:4px}.nav-links a,.nav-links button{font-size:12px;padding:6px 10px}.auth-btn{font-size:12px!important;padding:6px 10px!important}}
    @media(max-width:480px){.nav{flex-wrap:wrap;gap:6px;padding:8px 12px}.nav-links{flex-wrap:wrap;gap:4px}.nav-links a,.nav-links button{font-size:11px;padding:4px 8px}.auth-btn{font-size:11px!important;padding:4px 8px!important}}
    @media(max-width:360px){.nav-links a,.nav-links button{font-size:10px;padding:3px 6px}.auth-btn{font-size:10px!important;padding:3px 6px!important}.logo-icon{width:28px;height:28px}.logo span{font-size:14px}}
    .auth-card {
      width: 100%; max-width: 400px; margin: auto; padding: 16px;
      background: rgba(14, 24, 37, 0.95);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(226, 232, 240, 0.08);
      border-radius: 20px; padding: 32px 24px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.03);
      position: relative;
    }
    .close-btn {
      position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(148,163,184,0.08); border: none; border-radius: 8px;
      color: #94A3B8; cursor: pointer; transition: all .2s;
    }
    .close-btn:hover { background: rgba(148,163,184,0.15); color: #F8FAFC; }
    .auth-logo {
      text-align: center; margin-bottom: 24px;
    }
    .auth-logo .logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #0A4FD9, #00E5FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #FFFFFF;
      box-shadow: 0 4px 20px rgba(10, 79, 217, 0.45); margin: 0 auto 12px;
    }
    .auth-logo h1 { font-size: 20px; font-weight: 700; color: #F8FAFC; letter-spacing: -0.02em; }
    .auth-logo p { font-size: 13px; color: #64748B; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 600; color: #94A3B8;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      border: 1px solid rgba(226, 232, 240, 0.1);
      background: rgba(26, 37, 56, 0.5); color: #F8FAFC;
      font-size: 16px; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 250ms ease, box-shadow 250ms ease;
      box-shadow: 0 0 0 0 rgba(0, 229, 255, 0);
    }
    .form-group input:focus { border-color: #00E5FF; box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.2); }
    .form-group input::placeholder { color: #475569; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 8px;
      color: #64748B; display: flex; align-items: center; justify-content: center;
      transition: color .2s;
    }
    .pw-toggle:hover { color: #94A3B8; }
    .btn-primary {
      width: 100%; min-height: 48px; padding: 14px 24px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #0A4FD9, #00E5FF);
      color: #FFFFFF; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(10, 79, 217, 0.45);
      position: relative; overflow: hidden;
    }
    .btn-primary::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: opacity 250ms ease;
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(10, 79, 217, 0.6); transform: translateY(-1px); }
    .btn-primary:hover::after { opacity: 1; }
    .btn-primary:active { transform: translateY(1px); opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; transform: none; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #64748B; }
    .auth-footer a { color: #00E5FF; text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
    .error-msg {
      display: none; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px;
      background: rgba(239, 68, 68, 0.08); border-left: 4px solid #EF4444;
      font-size: 13px; color: #FCA5A5; line-height: 1.6;
    }
    .error-msg.show { display: block; }
    .spinner-sm {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: #FFFFFF;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) { .auth-card { padding: 24px 18px; border-radius: 16px; } }
  
    /* Comprehensive footer */
    .site-footer{padding:48px 24px 28px;background:linear-gradient(180deg,rgba(11,18,33,0.4),rgba(5,10,20,0.85));border-top:1px solid rgba(0,229,255,0.12);text-align:left;margin-top:48px;position:relative;overflow:hidden}
    .site-footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(800px,80%);height:1px;background:linear-gradient(90deg,transparent,#0A4FD9 30%,#00E5FF 70%,transparent);opacity:.6}
    .site-footer::after{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(10,79,217,0.08) 0%,transparent 60%);pointer-events:none}
    .footer-grid{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:32px;max-width:960px;margin:0 auto 24px;position:relative;z-index:1}
    .footer-brand-name{font-size:20px;font-weight:800;letter-spacing:-0.3px;margin-bottom:8px}
    .footer-tagline{font-size:13px;color:#94A3B8;line-height:1.5;margin:0;max-width:240px}
    .footer-col{display:flex;flex-direction:column;gap:6px}
    .footer-col-title{font-size:10px;font-weight:700;color:#00E5FF;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .footer-col a{color:#94A3B8;text-decoration:none;font-size:13px;padding:4px 0;transition:color .2s}
    .footer-col a:hover{color:#67E8F9}
    .footer-divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,#00E5FF,transparent);margin:0 auto 20px;border-radius:2px;opacity:.6;position:relative;z-index:1}
    .footer-meta{font-size:12px;color:#64748B;text-align:center;position:relative;z-index:1;letter-spacing:.2px}
    .footer-meta .brand-name{color:#94A3B8;font-weight:700;letter-spacing:.5px}
    .footer-meta a{color:#00E5FF;text-decoration:none;font-weight:500}
    .footer-meta a:hover{color:#67E8F9}
    @media(max-width:768px){
      .footer-grid{grid-template-columns:1fr 1fr;gap:20px}
      .footer-brand{grid-column:1 / -1}
    }
    @media(max-width:480px){
      .footer-grid{grid-template-columns:1fr;gap:18px}
      .site-footer{padding:36px 18px 24px}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="logo">
      <img src="/assets/icon32.png" alt="Scraven" class="logo-icon">
      <span><span class="brand-navy">Scra</span><span class="brand-white">ven</span></span>
    </a>
    <div class="nav-links">
      <a href="/extract">Extract</a>
      <a href="/leads">Leads</a>
      <a href="/qualified">Qualified</a>
      <a href="/pricing">Pricing</a>
    </div>
    <div id="auth-nav">
        <a href="/login" class="auth-btn" id="loginLink">Sign In</a>
        <span class="lead-badge" id="leadBadge" title="Leads used" style="display:none"></span>
        <a href="/profile" class="avatar-circle" id="profileLink" style="display:none">S</a>
        <a href="/admin" class="auth-btn" id="adminLink" style="display:none">Admin</a>
        <button class="auth-btn" id="logoutBtn" style="display:none">Logout</button>
      </div>
    </div>
  </nav>
  <div class="auth-card">
    <button class="close-btn" onclick="goBack()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="auth-logo">
      <div class="logo">S</div>
      <h1>Welcome back</h1>
      <p>Sign in to Scraven</p>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePw('password', this)" tabindex="-1" aria-label="Toggle password visibility">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div style="text-align:right;margin-top:-8px;margin-bottom:16px;font-size:13px"><a href="/forgot-password" style="color:#64748B;text-decoration:none">Forgot password?</a></div>
      <button type="submit" id="btnLogin" class="btn-primary">Sign In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:24px;font-size:12px;color:#475569"><span class="brand-name">Scraven</span> &middot; Powered by <a href="https://skarboltech.com" target="_blank" style="color:#00E5FF;text-decoration:none">Skarbol Tech</a></div>
<script>
    function goBack() {
      const p = new URLSearchParams(window.location.search);
      window.location.href = p.get('redirect') || '/';
    }
    const API_BASE = window.location.origin;
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnLogin');
    const errEl = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please fill in all fields.'); return; }
      btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Signing in...';
      errEl.classList.remove('show');
      try {
        const resp = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const result = await resp.json();
        if (resp.ok) {
          localStorage.setItem('skarbol_token', result.token);
          localStorage.setItem('skarbol_user', JSON.stringify(result.user));
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('redirect') || '/';
        } else {
          showError(result.error || 'Login failed');
        }
      } catch (err) { showError('Could not connect to server'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    });

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const isPassword = inp.type === 'password';
      inp.type = isPassword ? 'text' : 'password';
      btn.innerHTML = isPassword
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    function showError(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
  </script>
  <script>
    (function(){
      var token = localStorage.getItem('skarbol_token');
      if (token) {
        var user;
        try { user = JSON.parse(localStorage.getItem('skarbol_user') || 'null'); } catch(e) { user = null; }
        if (user && user.name) {
          document.getElementById('loginLink').style.display = 'none';
          document.getElementById('profileLink').style.display = 'none';
          document.getElementById('profileLink').textContent = user.name.charAt(0).toUpperCase();
          (function(){ var i=new Image(); i.onload=function(){ var a=document.getElementById('profileLink'); a.innerHTML=''; a.style.background='none'; a.style.padding='0'; a.appendChild(i); }; i.onerror=function(){}; i.src=window.location.origin+'/api/avatars/'+user.id+'.jpg?t='+Date.now(); })();
          document.getElementById('logoutBtn').style.display = 'none';
          if (user.role === 'admin' || user.role === 'super_admin') {
            document.getElementById('adminLink').style.display = 'none';
          }
          document.getElementById('logoutBtn').addEventListener('click', function(){
            fetch(window.location.origin + '/api/auth/logout', {method:'POST',headers:{'Authorization':'Bearer '+token}}).catch(function(){});
            localStorage.removeItem('skarbol_token');
            localStorage.removeItem('skarbol_user');
            location.reload();
          });
        }
      }
    })();
  </script>
  <script>document.querySelectorAll('.nav-links > a').forEach(function(a){var h=a.getAttribute('href');if(h===location.pathname||(h!=='/'&&location.pathname.startsWith(h))){a.classList.add('active');}})</script>
  <!-- Shared Facebook-style tab bar (every page) -->
  <script src="/assets/tabbar.js?v=8" defer></script>
</body>
</html>
