app = "lead-gen-api"
primary_region = "sin"

[build]
  builder = "dockerfile"

[http_service]
  internal_port = 8800
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "lead_data"
  destination = "/app/data"
