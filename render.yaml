services:
  - type: web
    name: scraven-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    rootDir: .
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: "scraven"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASS
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        value: "jahid.skarbol@gmail.com"
      - key: ALLOWED_ORIGINS
        value: "*"
    autoDeploy: true
